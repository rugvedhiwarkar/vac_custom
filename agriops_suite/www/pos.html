<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Vijay Agro Centre — counter POS">
<meta name="vac-csrf" content="{{ csrf_token }}">
<!-- Marathi is the counter default; the app rewrites lang/title from the stored choice -->
<title>VAC POS</title>
<link rel="manifest" href="/api/method/agriops_suite.pos_pwa.manifest">
<link rel="icon" href="/assets/agriops_suite/images/pos-icon-192.png">
<link rel="apple-touch-icon" href="/assets/agriops_suite/images/pos-icon-192.png">
<style>
/* native-ERPNext (Frappe UI) palette: light gray page, white cards, thin
   borders, dark-ink primary actions. Green/amber survive only as semantic
   accents (paid / udhaar). Variable NAMES kept from the first draft so the
   selectors below don't all need touching (--ivory is the page bg). */
:root {
	--green: #166b41;
	--green-dark: #0e4e2e;
	--green-soft: #e3f0e8;
	--amber: #b45309;
	--amber-dark: #8a3f07;
	--amber-soft: #fdf0e0;
	--blue: #1d4ed8;
	--blue-soft: #e5edff;
	--ivory: #f4f5f6;
	--card: #ffffff;
	--ink: #1f272e;
	--muted: #687178;
	--line: #e2e6e9;
	--soft: #f0f1f2;
	--primary: #171717;
	--red: #b91c1c;
	--red-soft: #fdecec;
	--radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 17px; }
body {
	font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Devanagari", sans-serif;
	background: var(--ivory); color: var(--ink);
	min-height: 100vh; overscroll-behavior-y: contain;
}
button { font: inherit; border: 0; cursor: pointer; background: none; color: inherit; }
input, select { font: inherit; color: inherit; }
#app { max-width: 640px; margin: 0 auto; padding-bottom: 96px; }

/* header */
.hdr {
	position: sticky; top: 0; z-index: 20;
	background: var(--card); color: var(--ink);
	padding: 10px 12px; display: flex; align-items: center; gap: 9px;
	border-bottom: 1px solid var(--line);
}
.hdr .ttl { font-size: 1.05rem; font-weight: 800; letter-spacing: .2px; }
.hdr .who { font-size: .74rem; color: var(--muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hdr .grow { flex: 1; min-width: 0; }
.netdot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; flex: none; }
.netdot.off { background: #f59e0b; }
.hbtn {
	min-width: 40px; height: 40px; border-radius: 10px; font-size: 1.15rem;
	background: var(--soft); color: var(--ink); display: flex; align-items: center; justify-content: center; flex: none;
}
.hbtn:active { background: var(--line); }
.hbtn.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pendbadge { background: var(--primary); color: #fff; font-weight: 800; font-size: .8rem; border-radius: 999px; padding: 3px 9px; flex: none; }

.offbar {
	background: var(--amber-soft); color: var(--amber-dark);
	font-size: .86rem; font-weight: 600; text-align: center;
	padding: 7px 12px; border-bottom: 1px solid #f0ddc2;
}
.offbar.err { background: var(--red-soft); color: var(--red); border-bottom-color: #f3cfcf; }

/* tabs */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--line); }
.tabs button { flex: 1; padding: 12px 8px; font-weight: 700; font-size: .96rem; color: var(--muted); border-bottom: 3px solid transparent; }
.tabs button.on { color: var(--ink); border-bottom-color: var(--primary); }
.tabs .bub { background: var(--amber); color: #fff; border-radius: 999px; font-size: .72rem; padding: 1px 7px; margin-left: 5px; font-weight: 800; }

/* sell view */
.qwrap { padding: 10px 12px 4px; background: var(--card); border-bottom: 1px solid var(--line); }
.qwrap input {
	width: 100%; border: 2px solid var(--line); border-radius: 12px;
	padding: 11px 13px; font-size: 1.02rem; background: #fff;
}
.qwrap input:focus { outline: none; border-color: var(--primary); }
.chips { display: flex; gap: 7px; overflow-x: auto; padding: 9px 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chips button {
	flex: none; border: 1.6px solid var(--line); border-radius: 999px; background: #fff;
	padding: 6px 13px; font-size: .86rem; font-weight: 700; color: var(--muted); white-space: nowrap;
}
.chips button.on { border-color: var(--primary); background: var(--soft); color: var(--ink); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 9px; padding: 4px 12px 12px; }
.tile {
	background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
	padding: 8px 8px 9px; text-align: center; display: flex; flex-direction: column; gap: 6px;
	min-height: 150px;
}
.tile:active { border-color: var(--primary); background: #fafafa; }
.tile:hover { border-color: #c8cdd2; }
.tile img { width: 100%; height: 74px; object-fit: contain; border-radius: 8px; background: #fff; }
.tile .noimg {
	width: 100%; height: 74px; border-radius: 8px; background: var(--soft); color: var(--muted);
	display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.35rem;
}
.tile .tn { font-size: .8rem; font-weight: 600; line-height: 1.25; flex: 1;
	display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tile .tp { font-size: .92rem; font-weight: 800; color: var(--ink); }
.tile .tp small { color: var(--muted); font-weight: 600; font-size: .68rem; }
.more { margin: 2px 12px 14px; padding: 12px; width: calc(100% - 24px); border: 2px dashed var(--line); border-radius: 12px; color: var(--muted); font-weight: 700; }
.nores { text-align: center; color: var(--muted); padding: 34px 20px; font-size: .95rem; }

/* cart bar */
.cartbar {
	position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
	max-width: 640px; margin: 0 auto; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
	background: transparent; pointer-events: none;
}
.cartbar button {
	pointer-events: auto; width: 100%; background: var(--primary); color: #fff;
	border-radius: 12px; padding: 15px 18px; font-size: 1.08rem; font-weight: 800;
	display: flex; justify-content: space-between; align-items: center;
	box-shadow: 0 6px 20px rgba(0,0,0,.28);
}
.cartbar button:active { background: #000; }

/* cart view */
.sec { background: var(--card); border-bottom: 1px solid var(--line); padding: 12px; }
.sec .sh { font-size: .78rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.custcard { display: flex; align-items: center; gap: 10px; }
.custcard .ci { width: 42px; height: 42px; border-radius: 50%; background: var(--soft); color: var(--muted); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; flex: none; }
.custcard .cn { font-weight: 700; font-size: 1rem; }
.custcard .cv { font-size: .8rem; color: var(--muted); }
.custcard .grow { flex: 1; min-width: 0; }
.custcard .chg { border: 1.6px solid var(--line); color: var(--ink); border-radius: 9px; padding: 8px 13px; font-weight: 700; font-size: .88rem; flex: none; background: #fff; }
.khata { display: inline-block; margin-top: 3px; background: var(--amber-soft); color: var(--amber-dark); font-size: .78rem; font-weight: 700; border-radius: 8px; padding: 2px 8px; }
.cline { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.cline:last-child { border-bottom: 0; }
.cline .ln { flex: 1; min-width: 0; }
.cline .lt { font-size: .92rem; font-weight: 600; line-height: 1.25; }
.cline .lr { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.cline .lr b { color: var(--ink); }
.qbox { display: flex; align-items: center; gap: 0; border: 1.6px solid var(--line); border-radius: 11px; overflow: hidden; flex: none; }
.qbox button { width: 40px; height: 40px; font-size: 1.25rem; font-weight: 800; color: var(--ink); background: var(--soft); }
.qbox .qv { min-width: 44px; text-align: center; font-weight: 800; font-size: 1rem; padding: 0 2px; }
.cline .amt { font-weight: 800; font-size: .95rem; min-width: 72px; text-align: right; flex: none; }
.cline .del { color: var(--red); font-size: 1.15rem; padding: 6px; flex: none; }
.totrow { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0 0; }
.totrow .tl { font-size: .95rem; font-weight: 700; color: var(--muted); }
.totrow .tv { font-size: 1.45rem; font-weight: 800; color: var(--ink); }
.paybtns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
.paybtns button { border: 2px solid var(--line); border-radius: 13px; background: #fff; padding: 13px 6px; font-weight: 800; font-size: .98rem; color: var(--muted); }
.paybtns button.cash.on { border-color: var(--primary); background: var(--soft); color: var(--ink); }
.paybtns button.upi.on { border-color: var(--primary); background: var(--soft); color: var(--ink); }
.paybtns button.udh.on { border-color: var(--amber); background: var(--amber-soft); color: var(--amber-dark); }
.gobtn {
	width: 100%; background: var(--primary); color: #fff; border-radius: 12px;
	padding: 16px; font-size: 1.12rem; font-weight: 800; margin-top: 11px;
}
.gobtn:active { background: #000; }
.gobtn:disabled { opacity: .55; }
.gobtn.udh { background: var(--amber); }
.gobtn.udh:active { background: var(--amber-dark); }
.backrow { display: flex; align-items: center; gap: 8px; padding: 10px 12px; }
.backrow button { font-weight: 700; color: var(--ink); font-size: .95rem; padding: 6px 10px 6px 0; }

/* pending view */
.pcard { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); margin: 10px 12px; padding: 12px; }
.pcard .pr { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.pcard .pref { font-weight: 800; font-size: .95rem; }
.pcard .pamt { font-weight: 800; font-size: 1.05rem; color: var(--green-dark); }
.pcard .pc { font-size: .85rem; color: var(--muted); margin-top: 2px; }
.pcard .st { display: inline-block; margin-top: 7px; border-radius: 8px; font-size: .78rem; font-weight: 800; padding: 3px 9px; }
.st.pend { background: var(--amber-soft); color: var(--amber-dark); }
.st.send { background: var(--blue-soft); color: var(--blue); }
.st.fail { background: var(--red-soft); color: var(--red); }
.st.done { background: var(--green-soft); color: var(--green-dark); }
.perr { font-size: .8rem; color: var(--red); margin-top: 6px; line-height: 1.35; word-break: break-word; }
.prow { display: flex; gap: 8px; margin-top: 10px; }
.prow button { flex: 1; border: 1.6px solid var(--line); border-radius: 10px; padding: 9px; font-weight: 700; font-size: .88rem; }
.prow .rt { border-color: var(--primary); color: var(--ink); }
.prow .dd { border-color: var(--red); color: var(--red); }
.prow .pp { border-color: var(--line); color: var(--muted); }
.psec { font-size: .8rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 16px 14px 2px; }
.pnote { font-size: .8rem; color: var(--muted); margin: 8px 14px 20px; line-height: 1.45; }

/* settings */
.setrow { margin-bottom: 12px; }
.setrow label { display: block; font-size: .8rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
.setrow input { width: 100%; border: 2px solid var(--line); border-radius: 11px; padding: 10px 12px; background: #fff; }
.setrow input:focus { outline: none; border-color: var(--primary); }
.setbtn { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 13px; font-weight: 700; background: #fff; margin-top: 9px; }
.setbtn.warn { border-color: var(--red); color: var(--red); }
.setbtn.act { border-color: var(--primary); color: var(--ink); background: #fff; }
.togrow { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.togrow .tl2 { font-weight: 700; font-size: .95rem; }
.tog { width: 52px; height: 30px; border-radius: 999px; background: var(--line); position: relative; transition: background .15s; flex: none; }
.tog.on { background: var(--green); }
.tog::after { content: ""; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: left .15s; }
.tog.on::after { left: 25px; }
.langrow2 { display: flex; gap: 8px; }
.langrow2 button { flex: 1; border: 2px solid var(--line); border-radius: 11px; padding: 10px; font-weight: 700; background: #fff; color: var(--muted); }
.langrow2 button.on { border-color: var(--primary); background: var(--soft); color: var(--ink); }
.vtag { text-align: center; color: var(--muted); font-size: .75rem; margin: 18px 0 8px; }

/* customer modal */
.ovl { position: fixed; inset: 0; background: rgba(20,18,14,.5); z-index: 60; display: none; align-items: flex-end; justify-content: center; }
.ovl.show { display: flex; }
.sheet {
	background: var(--ivory); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
	max-height: 86vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
}
.sheet .shh { display: flex; align-items: center; gap: 8px; padding: 13px 14px 9px; }
.sheet .shh .t { font-weight: 800; font-size: 1.02rem; flex: 1; }
.sheet .shh .x { font-size: 1.3rem; color: var(--muted); padding: 4px 8px; }
.sheet .sq { padding: 0 14px 10px; }
.sheet .sq input { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 11px 13px; background: #fff; }
.sheet .sq input:focus { outline: none; border-color: var(--primary); }
.clist { overflow-y: auto; flex: 1; padding: 0 10px 12px; }
.crow { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin: 0 4px 8px; }
.crow:active { border-color: var(--primary); background: #fafafa; }
.crow .ci2 { width: 38px; height: 38px; border-radius: 50%; background: var(--soft); color: var(--muted); display: flex; align-items: center; justify-content: center; font-weight: 800; flex: none; }
.crow .cm { flex: 1; min-width: 0; }
.crow .cn2 { font-weight: 700; font-size: .95rem; }
.crow .cd2 { font-size: .78rem; color: var(--muted); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.newc { margin: 2px 14px 12px; }
.newc .setbtn { margin-top: 7px; }
.newform { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; margin: 0 14px 12px; }
.newform input { width: 100%; border: 2px solid var(--line); border-radius: 11px; padding: 10px 12px; background: #fff; margin-bottom: 9px; }
.newform input:focus { outline: none; border-color: var(--primary); }

/* login */
.pairwrap { padding: 44px 26px; text-align: center; }
.pairwrap .logo { width: 84px; height: 84px; border-radius: 22px; background: var(--primary); color: #fff; font-size: 2.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
.pairwrap h1 { font-size: 1.35rem; margin-bottom: 6px; }
.pairwrap p { color: var(--muted); font-size: .92rem; margin-bottom: 20px; line-height: 1.5; }
.pairwrap input { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 13px 14px; background: #fff; margin-bottom: 10px; font-size: 1rem; }
.pairwrap input:focus { outline: none; border-color: var(--primary); }
.pairwrap .go { width: 100%; background: var(--primary); color: #fff; border-radius: 12px; padding: 14px; font-size: 1.05rem; font-weight: 800; margin-top: 4px; }
.pairwrap .go:disabled { opacity: .6; }
.pairerr { color: var(--red); font-size: .88rem; margin-top: 12px; min-height: 1.2em; }
.langrow { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
.langrow button { border: 2px solid var(--line); border-radius: 999px; padding: 7px 14px; font-size: .9rem; font-weight: 700; background: #fff; color: var(--muted); }
.langrow button.on { border-color: var(--primary); background: var(--soft); color: var(--ink); }

/* desktop / counter PC: native-POS two-pane split (items left, bill right) */
@media (min-width: 1000px) {
	html { font-size: 15px; }
	#app { max-width: 1320px; padding-bottom: 24px; }
	.cartbar { display: none; }
	.cols { display: grid; grid-template-columns: minmax(0, 1fr) 420px; align-items: start; }
	.colR { position: sticky; top: 63px; max-height: calc(100vh - 67px); min-height: calc(100vh - 67px); overflow-y: auto; border-left: 1px solid var(--line); background: var(--card); }
	.cols .backrow { display: none; }
	.grid { grid-template-columns: repeat(auto-fill, minmax(126px, 1fr)); gap: 10px; }
	.ovl { align-items: center; }
	.sheet { border-radius: 16px; max-height: 82vh; max-width: 560px; }
}

/* toast */
#toast {
	position: fixed; bottom: 106px; left: 50%; transform: translateX(-50%) translateY(20px);
	background: var(--ink); color: #fff; border-radius: 12px; padding: 11px 18px;
	font-size: .92rem; font-weight: 600; opacity: 0; pointer-events: none;
	transition: all .22s ease; z-index: 90; max-width: 88vw; text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* receipt print */
#receipt { display: none; }
@media print {
	@page { margin: 3mm; }
	body { background: #fff; }
	#wrap, #toast { display: none !important; }
	#receipt { display: block !important; width: 72mm; font-family: "Segoe UI", "Noto Sans Devanagari", monospace; font-size: 11.5px; line-height: 1.4; color: #000; }
	#receipt .rc { text-align: center; }
	#receipt .rb { font-weight: 800; }
	#receipt .rh1 { font-size: 15px; font-weight: 800; }
	#receipt hr { border: 0; border-top: 1px dashed #000; margin: 5px 0; }
	#receipt table { width: 100%; border-collapse: collapse; }
	#receipt td { padding: 1.5px 0; vertical-align: top; }
	#receipt .tr { text-align: right; white-space: nowrap; }
	#receipt .tot td { font-size: 13.5px; font-weight: 800; padding-top: 4px; }
	#receipt .sm { font-size: 10px; }
}
</style>
</head>

/* ---------- IndexedDB (kv + outbox queue) ---------- */
var _db = null, _dbFailed = false, STORAGE_OK = true;
function db() {
	return new Promise(function (res, rej) {
		if (_db) { res(_db); return; }
		if (_dbFailed) { rej(new Error("idb unavailable")); return; }
		var settled = false;
		function fail(why) { if (settled) return; settled = true; _dbFailed = true; STORAGE_OK = false; rej(new Error(why)); }
		var r;
		try { r = indexedDB.open("vacpos", 1); }
		catch (e) { fail("open threw"); return; }
		r.onupgradeneeded = function () {
			var d = r.result;
			if (!d.objectStoreNames.contains("queue")) d.createObjectStore("queue", { keyPath: "uid" });
			if (!d.objectStoreNames.contains("kv")) d.createObjectStore("kv");
		};
		r.onsuccess = function () { if (settled) return; settled = true; _db = r.result; res(_db); };
		r.onerror = function () { fail("open error"); };
		r.onblocked = function () { fail("open blocked"); };
		setTimeout(function () { fail("open timed out"); }, 5000);
	});
}
function idbQPut(v) { return db().then(function (d) { return new Promise(function (res, rej) { var t = d.transaction("queue", "readwrite"); t.objectStore("queue").put(v); t.oncomplete = function () { res(); }; t.onerror = function () { rej(t.error); }; }); }); }
function idbQDel(k) { return db().then(function (d) { return new Promise(function (res, rej) { var t = d.transaction("queue", "readwrite"); t.objectStore("queue").delete(k); t.oncomplete = function () { res(); }; t.onerror = function () { rej(t.error); }; }); }); }
function idbQAll() { return db().then(function (d) { return new Promise(function (res, rej) { var q = d.transaction("queue").objectStore("queue").getAll(); q.onsuccess = function () { res(q.result || []); }; q.onerror = function () { rej(q.error); }; }); }); }
function idbKGet(k) { return db().then(function (d) { return new Promise(function (res, rej) { var q = d.transaction("kv").objectStore("kv").get(k); q.onsuccess = function () { res(q.result); }; q.onerror = function () { rej(q.error); }; }); }); }
function idbKPut(k, v) { return db().then(function (d) { return new Promise(function (res, rej) { var t = d.transaction("kv", "readwrite"); t.objectStore("kv").put(v, k); t.oncomplete = function () { res(); }; t.onerror = function () { rej(t.error); }; }); }); }

/* ---------- api (device token OR session cookie + CSRF) ---------- */
function api(path, opts) {
	opts = opts || {};
	var headers = {};
	if (TOKEN) headers["Authorization"] = "token " + TOKEN;
	else if (CSRF) headers["X-Frappe-CSRF-Token"] = CSRF;
	var body;
	if (opts.json) { headers["Content-Type"] = "application/json"; body = JSON.stringify(opts.json); }
	return fetch(path, {
		method: opts.method || "GET",
		headers: headers,
		body: body,
		credentials: "same-origin"
	}).catch(function () {
		throw { net: true, message: T("syncfail") };
	}).then(function (res) {
		if (res.status === 401 || res.status === 403) throw { auth: true, message: T("login_bad") };
		return res.text().then(function (text) {
			var data = {};
			try { data = JSON.parse(text); } catch (e) { }
			if (!res.ok) {
				var m = data.exception || ("HTTP " + res.status);
				if (data._server_messages) {
					try { m = JSON.parse(JSON.parse(data._server_messages)[0]).message || m; } catch (e) { }
				}
				/* an absent Server Script surfaces as 417 "Failed to get method",
				   not 404 (verified against prod 2026-07-24) — both mean
				   "endpoints not installed on this site" */
				var absent = res.status === 404 ||
					(res.status === 417 && String(m).indexOf("Failed to get method") !== -1);
				throw { notfound: absent, message: String(m).replace(/<[^>]*>/g, "").slice(0, 220) };
			}
			return data;
		});
	});
}

function pad2(n) { return String(n).padStart(2, "0"); }
function today() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }

	return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()) + " " +
		pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
}

	return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : "u" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);

function qtyfmt(q) { q = Number(q) || 0; return (q % 1 === 0) ? String(q) : q.toFixed(3).replace(/0+$/, "").replace(/\.$/, ""); }
function norm(s) { return String(s || "").toLowerCase(); }

var CATALOG = null, ITEMS = [], PRICES = {}, CUSTOMERS = [], PROFILE = {}, GROUPS = [];
function adoptCatalog(c) {
	CATALOG = c || null;
	ITEMS = (c && c.items) || [];
	CUSTOMERS = (c && c.customers) || [];
	PROFILE = (c && c.profile) || {};
	PRICES = {};
	var pr = (c && c.prices) || [];
	for (var i = 0; i < pr.length; i++) PRICES[pr[i].item_code] = pr[i].price_list_rate;
	var gc = {};
	for (var j = 0; j < ITEMS.length; j++) { var g = ITEMS[j].item_group || ""; gc[g] = (gc[g] || 0) + 1; }
	GROUPS = Object.keys(gc).sort(function (a, b) { return gc[b] - gc[a]; }).slice(0, 8);
}

var CAT_TTL = 6 * 60 * 60 * 1000;
function refreshCatalog(force) {
	if (!force && CATALOG && CATALOG.ts && (Date.now() - CATALOG.ts < CAT_TTL)) return Promise.resolve(false);
	if (!navigator.onLine) return Promise.resolve(false);
	return api("/api/method/vac_pos_catalog?profile=" + encodeURIComponent(S.profile)).then(function (data) {
		var m = data.message || {};
		m.ts = Date.now();
		adoptCatalog(m);
		idbKPut("catalog", m).catch(function () { });
		return true;
	});
}

function matchItems() {
	var q = norm(searchQ), out = [];
	for (var i = 0; i < ITEMS.length; i++) {
		var it = ITEMS[i];
		if (groupF && it.item_group !== groupF) continue;
		if (q && norm(it.item_name).indexOf(q) === -1 && norm(it.name).indexOf(q) === -1) continue;
		out.push(it);
	}
	return out;
}
function renderSell() {
	var h = '<div class="qwrap"><input id="q" type="search" placeholder="' + esc(T("search_ph")) + '" value="' + esc(searchQ) + '" oninput="onQ(this.value)" onkeydown="qKey(event)"></div>';
	h += '<div class="chips"><button class="' + (groupF ? "" : "on") + '" onclick="setGroup(\'\')">' + esc(T("all")) + "</button>";
	for (var i = 0; i < GROUPS.length; i++) {
		var g = GROUPS[i];
		/* data attribute, not an inline JS string — names may contain quotes */
		h += '<button class="' + (groupF === g ? "on" : "") + '" data-g="' + esc(g) + '" onclick="setGroup(this.dataset.g)">' + esc(g) + "</button>";
	}
	h += "</div>";
	var m = matchItems();
	if (!m.length) h += '<div class="nores">' + esc(T("nores")) + "</div>";
	else {
		h += '<div class="grid" id="grid">';
		var cap = Math.min(m.length, gridCap);
		for (var j = 0; j < cap; j++) h += tileHtml(m[j]);
		h += "</div>";
		if (m.length > cap) h += '<button class="more" onclick="moreTiles()">' + esc(T("more")) + " (" + (m.length - cap) + ")</button>";
	}
	if (cart.length) {

/* ---------- checkout ---------- */
function checkout() {
	if (!cart.length || BUSY) return;
	if (payMode === "Udhaar" && !CUST) { toast(T("need_cust")); openCust(); return; }
	BUSY = true; render();
	var total = cartTotal();
	var sale = {
		uid: uidNew(),
		ref: nextRef(),
		ts: nowStamp(),
		date: today(),
		customer: CUST ? CUST.name : walkinName(),
		customer_name: CUST ? CUST.customer_name : walkinName(),
		mode: payMode,
		total: total,
		items: cart.map(function (l) { return { item_code: l.code, item_name: l.name, uom: l.uom, qty: l.qty, rate: l.rate }; }),
		payments: payMode === "Udhaar" ? [] : [{ mode_of_payment: payMode, amount: total }],
		status: "pending", err: "", result: null
	};
	queue.push(sale);
	idbQPut(sale).catch(function () { toast("storage!"); });
	cart = []; CUST = null; KHATA = null; payMode = "Cash"; BUSY = false; VIEW = "sell";
	render();
	toast(T("queued") + " " + sale.ref);
	if (S.autoprint) printSale(sale);
	syncNow(false);
}

/* ---------- sync ---------- */
function syncNow(manual) {
	if (SYNCING || !navigator.onLine || DISABLED) return;
	var work = [];
	for (var i = 0; i < queue.length; i++) {
		if (queue[i].status === "pending" || (manual && queue[i].status === "failed")) work.push(queue[i]);
	}
	if (!work.length) return;
	SYNCING = true;
	var sb = $id("syncbtn"); if (sb) sb.classList.add("spin");
	var idx = 0;
	function fin() {
		SYNCING = false;
		var sb2 = $id("syncbtn"); if (sb2) sb2.classList.remove("spin");
		render();
	}
	function step() {
		if (idx >= work.length) { fin(); return; }
		var sale = work[idx];
		sale.status = "sending"; sale.err = "";
		if (VIEW === "pending") render();
		api("/api/method/vac_pos_create_invoice", {
			method: "POST",
			json: {
				pwa_client_id: sale.uid,
				pos_profile: S.profile,
				customer: sale.customer,
				items: sale.items.map(function (l) { return { item_code: l.item_code, qty: l.qty, rate: l.rate }; }),
				payments: sale.payments,
				posting_date: sale.date,
				remarks: "POS PWA " + sale.ref
			}
		}).then(function (d) {
			var m = d.message || {};
			sale.status = "done"; sale.result = m;
			done.unshift(sale); saveDone();
			for (var k = 0; k < queue.length; k++) if (queue[k].uid === sale.uid) { queue.splice(k, 1); break; }
			idbQDel(sale.uid).catch(function () { });
			toast(T("billno") + " " + (m.name || ""));
			idx += 1; step();
		}).catch(function (e) {
			if (e && e.auth) { sale.status = "pending"; idbQPut(sale).catch(function () { }); fin(); needLogin(); return; }
			if (e && e.net) { sale.status = "pending"; idbQPut(sale).catch(function () { }); fin(); return; }
			if (e && e.notfound) { sale.status = "pending"; idbQPut(sale).catch(function () { }); fin(); disabledCheck(); return; }
			sale.status = "failed"; sale.err = (e && e.message) || "?";
			idbQPut(sale).catch(function () { });
			idx += 1; step();
		});
	}
	step();
}

function retrySale(uid) {

		'<button class="setbtn act" onclick="doRefresh()">' + esc(T("set_refresh")) + "</button>" +
		'<button class="setbtn warn" onclick="doLogout()">' + esc(T("set_logout")) + "</button>";
	h += '<details style="margin-top:12px"><summary style="color:var(--muted);font-size:.85rem;font-weight:700">' + esc(T("set_adv")) + "</summary>" +
		'<div class="setrow" style="margin-top:10px"><label>' + esc(T("set_token")) + '</label><input id="tok" type="password" value="' + esc(TOKEN) + '"></div>' +
		'<button class="setbtn" onclick="saveTok()">' + esc(T("set_save")) + "</button></details>";
	h += '<div class="vtag">' + esc(POSV) + " • " + esc(S.profile) + "</div></div>";
	return h;
}
function chS(k, v) { S[k] = String(v).trim(); saveS(); render(); }
function togAuto() { S.autoprint = S.autoprint ? 0 : 1; saveS(); render(); }
function doRefresh() {
	toast("…");
	refreshCatalog(true).then(function () { toast(T("refreshed")); render(); })
		.catch(function (e) {
			if (e && e.auth) { needLogin(); return; }
			if (e && e.notfound) { disabledCheck(); return; }
			toast((e && e.message) || "?");
		});
}
function saveTok() {
	var v = (($id("tok") || {}).value || "").trim();
	TOKEN = v;
	if (v) LS.vacpos_token = v; else LS.removeItem("vacpos_token");
	boot();
}
function disabledCheck() { DISABLED = true; render(); }

/* ---------- authentication (device token OR email + password session) ---------- */
function ensureAuth() {
	if (!navigator.onLine) {
		AUTHED = LS.vacpos_authed === "1";
		if (AUTHED && !AUTH) { try { AUTH = JSON.parse(LS.vacpos_auth || "null"); } catch (e) { } }
		return Promise.resolve(AUTHED);
	}
	if (TOKEN) {
		return api("/api/method/vac_pos_ping").then(function (d) {
			var m = d.message || {};
			AUTH = { user: m.user, full_name: m.user }; AUTHED = true;
			LS.vacpos_authed = "1"; LS.vacpos_auth = JSON.stringify(AUTH);
			return true;
		}).catch(function (e) {
			if (e && e.notfound) { DISABLED = true; return false; }
			AUTHED = false; LS.removeItem("vacpos_authed");
			return false;
		});
	}
	return fetch("/api/method/agriops_suite.pos_pwa.csrf", { credentials: "same-origin" })
		.then(function (r) { return r.ok ? r.json() : null; })
		.then(function (j) {
			var m = j && j.message;
			if (m && m.csrf_token) {
				CSRF = m.csrf_token; AUTH = m; AUTHED = true;
				LS.vacpos_authed = "1"; LS.vacpos_auth = JSON.stringify({ user: m.user, full_name: m.full_name });
				return true;
			}
			AUTHED = false; LS.removeItem("vacpos_authed");
			return false;
		})
		.catch(function () { AUTHED = LS.vacpos_authed === "1"; return AUTHED; });
}
function needLogin() {
	AUTHED = false; CSRF = ""; LS.removeItem("vacpos_authed");
	renderLogin("");
}
function renderLogin(err) {
	var langs = "";
	LANGS.forEach(function (l) {
		langs += '<button class="' + (l.code === LANG ? "on" : "") + '" onclick="setLang(\'' + l.code + '\')">' + esc(l.label) + "</button>";
	});
	$id("app").innerHTML =
		'<div class="pairwrap"><div class="logo">₹</div>' +
		"<h1>" + esc(T("login_h")) + "</h1>" +
		'<div class="langrow">' + langs + "</div>" +
		"<p>" + esc(T("login_sub")) + "</p>" +
		'<input id="lem" type="email" inputmode="email" placeholder="' + esc(T("login_email")) + '" autocapitalize="off" autocorrect="off" spellcheck="false">' +
		'<input id="lpw" type="password" placeholder="' + esc(T("login_pw")) + '">' +
		'<button class="go" id="lbtn" onclick="doLogin()">' + esc(T("login_go")) + "</button>" +
		'<div class="pairerr">' + esc(err || "") + "</div></div>";
	var pw = $id("lpw");
	if (pw) pw.addEventListener("keydown", function (e) { if (e.key === "Enter") doLogin(); });
}
function doLogin() {
	var email = (($id("lem") || {}).value || "").trim();
	var pw = ($id("lpw") || {}).value || "";
	if (!email || !pw) { renderLogin(T("login_bad")); if ($id("lem")) $id("lem").value = email; return; }
	var btn = $id("lbtn");
	if (btn) { btn.disabled = true; btn.textContent = T("login_ing"); }
	fetch("/api/method/login", {
		method: "POST",
		headers: { "Content-Type": "application/x-www-form-urlencoded" },
		body: "usr=" + encodeURIComponent(email) + "&pwd=" + encodeURIComponent(pw),
		credentials: "same-origin"
	}).then(function (r) {
		if (r.status === 429) throw { m: T("login_locked") };
		if (!r.ok) throw { m: T("login_bad") };
		return ensureAuth();
	}).then(function (ok) {
		if (!ok) throw { m: T("login_bad") };
		boot();
	}).catch(function (e) {
		renderLogin(e && e.m ? e.m : T("login_net"));
		if ($id("lem")) $id("lem").value = email;
	});
}
function doLogout() {
	if (!confirm(T("logout_q"))) return;
	fetch("/api/method/logout", { credentials: "same-origin" })
		.catch(function () { }).then(function () {
			CSRF = ""; AUTHED = false; AUTH = null; TOKEN = "";
			LS.removeItem("vacpos_authed"); LS.removeItem("vacpos_token");
			toast(T("bye"));
			renderLogin("");
		});
}

/* ---------- net ---------- */
function updateNet() {
	var d = $id("netdot");
	if (d) d.className = "netdot" + (navigator.onLine ? "" : " off");
	if (AUTHED) render();
}

/* ---------- boot ---------- */
function boot() {
	applyLangChrome();
	document.body.insertAdjacentHTML("beforeend", '<div class="ovl" id="custovl" onclick="closeCust()"></div>');
	var old = document.querySelectorAll("#custovl");
	for (var i = 0; i < old.length - 1; i++) old[i].parentNode.removeChild(old[i]);
	loadDone();
	ensureAuth().then(function (authed) {
		if (DISABLED) { renderDisabled(); return; }
		if (!authed) { renderLogin(""); return; }
		Promise.all([
			idbKGet("catalog").catch(function () { return null; }),
			idbQAll().catch(function () { return []; })
		]).then(function (rs) {
			if (rs[0]) adoptCatalog(rs[0]);
			queue = rs[1] || [];
			/* anything stuck in "sending" from a killed tab goes back to pending */
			for (var i = 0; i < queue.length; i++) if (queue[i].status === "sending") queue[i].status = "pending";
			queue.sort(function (a, b) { return a.ts < b.ts ? -1 : 1; });
			render();
			return refreshCatalog(!CATALOG);
		}).then(function (changed) {
			if (changed) render();
			syncNow(false);
		}).catch(function (e) {
			if (e && e.auth) { needLogin(); return; }
			if (e && e.notfound) { disabledCheck(); return; }
			if (e && e.message) toast(e.message);
		});
	});
}

window.addEventListener("online", function () { updateNet(); syncNow(false); });
window.addEventListener("offline", updateNet);
var _rz = null;
window.addEventListener("resize", function () {
	clearTimeout(_rz);
	_rz = setTimeout(function () { if (AUTHED && !DISABLED) render(); }, 150);
});
document.addEventListener("visibilitychange", function () { if (!document.hidden && AUTHED) syncNow(false); });
setInterval(function () { if (AUTHED && queue.length) syncNow(false); }, 25000);

if ("serviceWorker" in navigator && location.pathname === "/pos") {
	try { navigator.serviceWorker.register("/api/method/agriops_suite.pos_pwa.sw", { scope: "/pos" }).catch(function () { }); } catch (e) { }
}

boot();
</script>
