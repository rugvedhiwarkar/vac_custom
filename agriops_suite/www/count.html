<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b45309">
<meta name="description" content="Vijay Agro Centre — stock count">
<meta name="vac-csrf" content="{{ csrf_token }}">
<!-- English is the default; the app rewrites lang/title from the stored choice -->
<title>VAC Stock Count</title>
<link rel="manifest" href="/api/method/agriops_suite.count.manifest">
<link rel="icon" href="/assets/agriops_suite/images/count-icon-192.png">
<link rel="apple-touch-icon" href="/assets/agriops_suite/images/count-icon-192.png">
<style>
:root {
	--amber: #b45309;
	--amber-dark: #8a3f07;
	--amber-soft: #fdf0e0;
	--green: #166b41;
	--green-soft: #e3f0e8;
	--ivory: #f6f5f0;
	--card: #ffffff;
	--ink: #22221e;
	--muted: #6b6b62;
	--line: #dddbd2;
	--red: #b91c1c;
	--red-soft: #fdecec;
	--radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 17px; }
body {
	font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans Devanagari", sans-serif;
	background: var(--ivory); color: var(--ink);
	min-height: 100vh; overscroll-behavior-y: contain;
}
button { font: inherit; border: 0; cursor: pointer; background: none; color: inherit; }
input { font: inherit; color: inherit; }
#app { max-width: 520px; margin: 0 auto; padding-bottom: 90px; }

/* header */
.hdr {
	position: sticky; top: 0; z-index: 20;
	background: var(--amber); color: #fff;
	padding: 11px 14px; display: flex; align-items: center; gap: 10px;
	box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.hdr .ttl { font-size: 1.12rem; font-weight: 700; letter-spacing: .3px; }
.hdr .who { font-size: .78rem; opacity: .88; margin-top: 1px; }
.hdr .grow { flex: 1; min-width: 0; }
.netdot { width: 11px; height: 11px; border-radius: 50%; background: #7ef0ae; box-shadow: 0 0 6px #7ef0ae; }
.netdot.off { background: #ffd48a; box-shadow: none; }
.hdr .sync {
	min-width: 44px; height: 44px; border-radius: 12px; font-size: 1.3rem;
	background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center;
}
.hdr .sync:active { background: rgba(255,255,255,.3); }
.hdr .sync.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.pendbadge { background: #fff; color: var(--amber-dark); font-weight: 800; font-size: .82rem; border-radius: 999px; padding: 3px 10px; }
.hdr .langbtn {
	min-width: 44px; height: 44px; border-radius: 12px; font-size: .85rem; font-weight: 800;
	background: rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center;
}
.hdr .langbtn:active { background: rgba(255,255,255,.3); }

/* language picker */
.langovl { position: fixed; inset: 0; background: rgba(20,18,14,.45); z-index: 80; display: none; align-items: center; justify-content: center; padding: 24px; }
.langovl.show { display: flex; }
.langbox { background: var(--card); border-radius: 18px; padding: 18px 16px; width: 100%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
.langbox .lt { font-size: .82rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; text-align: center; }
.langbox button {
	display: block; width: 100%; border: 2px solid var(--line); border-radius: 12px;
	padding: 14px; margin-top: 9px; font-size: 1.08rem; font-weight: 700; background: #fff;
}
.langbox button.on { border-color: var(--amber); background: var(--amber-soft); color: var(--amber-dark); }
.langbox button:active { background: var(--amber-soft); }
/* language row on the pairing screen (before there is a header) */
.langrow { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
.langrow button {
	border: 2px solid var(--line); border-radius: 999px; padding: 8px 14px;
	font-size: .92rem; font-weight: 700; background: #fff; color: var(--muted);
}
.langrow button.on { border-color: var(--amber); background: var(--amber-soft); color: var(--amber-dark); }

.offbar {
	background: var(--amber-soft); color: var(--amber-dark);
	font-size: .88rem; font-weight: 600; text-align: center;
	padding: 8px 12px; border-bottom: 1px solid #f0ddc2;
}
.offbar.warn { background: var(--red-soft); color: var(--red); border-bottom-color: #f3cfcf; }

/* warehouse bar */
.whbar {
	display: flex; align-items: center; gap: 8px; width: 100%;
	background: var(--amber-dark); color: #fff; padding: 9px 14px;
	font-size: .92rem; text-align: left;
}
.whbar:active { background: #6f3206; }
.whbar .pin { opacity: .8; font-size: .8rem; }
.whbar .wn { flex: 1; min-width: 0; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.whbar .wc { opacity: .8; font-size: .8rem; font-weight: 600; white-space: nowrap; }
.langbox .wco { font-size: .95rem; font-weight: 700; color: var(--amber-dark); text-align: center; margin: -4px 0 6px; }

/* progress */
.prog { background: var(--card); padding: 12px 14px 14px; border-bottom: 1px solid var(--line); }
.prog .pline { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.prog .pn { font-size: 1.5rem; font-weight: 800; }
.prog .pt { font-size: .88rem; color: var(--muted); }
.prog .bar { height: 9px; border-radius: 999px; background: var(--line); overflow: hidden; }
.prog .bar > div { height: 100%; background: var(--green); border-radius: 999px; transition: width .3s ease; }

/* tabs */
/* deliberately NOT sticky: the offline bar, the storage warning and the
   warehouse bar all sit above it, so any fixed top offset is wrong some of
   the time and overlaps the list. The header alone stays pinned. */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--line); }
.tabs button { flex: 1; padding: 13px 8px; font-weight: 700; font-size: .98rem; color: var(--muted); border-bottom: 3px solid transparent; }
.tabs button.on { color: var(--amber-dark); border-bottom-color: var(--amber); }

/* item cards */
.grp { margin: 16px 12px 6px; font-size: .8rem; font-weight: 800; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
.it {
	display: flex; align-items: center; gap: 12px;
	background: var(--card); border-radius: var(--radius); margin: 8px 12px;
	padding: 14px; box-shadow: 0 1px 4px rgba(40,40,20,.07);
	border-left: 5px solid transparent; width: calc(100% - 24px); text-align: left;
}
.it:active { background: #faf8f3; }
.it.fam { margin-left: 30px; width: calc(100% - 42px); border-left-color: var(--line); }
.it.done { border-left-color: var(--green); background: var(--green-soft); }
.it.pend { border-left-color: var(--amber); }
.it .g { flex: 1; min-width: 0; }
.it .n { font-weight: 700; font-size: 1rem; line-height: 1.3; }
.it .s { font-size: .8rem; color: var(--muted); margin-top: 3px; }
.it .s .sep { opacity: .5; }
.it .qty { font-size: 1.45rem; font-weight: 800; color: var(--green); min-width: 46px; text-align: right; }
.it .chev { color: var(--line); font-size: 1.3rem; }
.tag { display: inline-block; font-size: .68rem; font-weight: 800; border-radius: 6px; padding: 2px 6px; margin-right: 6px; vertical-align: 1px; }
.tag.pri { background: var(--red-soft); color: var(--red); }
.tag.fam { background: var(--amber-soft); color: var(--amber-dark); }
.tag.today { background: #e7ecfb; color: #24418f; }
.empty { text-align: center; color: var(--muted); padding: 40px 24px; font-size: .95rem; line-height: 1.6; }

/* finish bar */
.fbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: linear-gradient(180deg, rgba(246,245,240,0), var(--ivory) 32%); }
.fbar button {
	display: block; max-width: 496px; margin: 0 auto; width: 100%;
	background: var(--green); color: #fff; border-radius: var(--radius);
	padding: 15px; font-size: 1.1rem; font-weight: 800;
	box-shadow: 0 3px 10px rgba(22,107,65,.3);
}
.fbar button:active { background: #0e4d2e; }
.fbar button[disabled] { background: var(--line); color: var(--muted); box-shadow: none; }

/* count sheet */
.sheet { position: fixed; inset: 0; background: var(--ivory); z-index: 60; display: none; flex-direction: column; }
.sheet.show { display: flex; }
.sheet .shd { background: var(--amber); color: #fff; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
.sheet .shd .back { min-width: 44px; height: 44px; font-size: 1.5rem; }
.sheet .shd .t1 { font-weight: 700; font-size: 1.02rem; line-height: 1.25; }
.sheet .shd .t2 { font-size: .78rem; opacity: .85; margin-top: 2px; }
.sheet .body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.ask { text-align: center; padding: 20px 16px 8px; font-size: 1rem; color: var(--muted); font-weight: 600; }
.ask b { color: var(--ink); }
.disp {
	text-align: center; font-size: 3.2rem; font-weight: 800; padding: 4px 16px 6px;
	min-height: 74px; letter-spacing: 1px;
}
.disp.ph { color: var(--line); }
.notechips { display: flex; gap: 8px; padding: 4px 14px 12px; justify-content: center; flex-wrap: wrap; }
.notechips button {
	border: 2px solid var(--line); border-radius: 999px; padding: 8px 14px;
	font-size: .88rem; font-weight: 700; background: #fff; color: var(--muted);
}
.notechips button.on { border-color: var(--amber); background: var(--amber-soft); color: var(--amber-dark); }
.pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px 12px 12px; }
.pad button {
	background: #fff; border: 1px solid var(--line); border-radius: 12px;
	font-size: 1.7rem; font-weight: 700; padding: 14px 0;
	box-shadow: 0 1px 3px rgba(40,40,20,.07);
}
.pad button:active { background: var(--amber-soft); }
.pad button.fn { font-size: 1.3rem; color: var(--amber-dark); }
.sheet .savewrap { padding: 6px 12px calc(14px + env(safe-area-inset-bottom)); }
.sheet .save {
	width: 100%; background: var(--green); color: #fff; border-radius: var(--radius);
	padding: 16px; font-size: 1.15rem; font-weight: 800;
}
.sheet .save:active { background: #0e4d2e; }
.sheet .save[disabled] { background: var(--line); color: var(--muted); }
.locked { margin: 14px; padding: 14px; border-radius: 12px; background: var(--amber-soft); color: var(--amber-dark); font-size: .92rem; font-weight: 600; line-height: 1.5; }

/* search */
.srch { padding: 12px; }
.srch input { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 13px 14px; font-size: 1.05rem; background: #fff; }
.srch input:focus { outline: none; border-color: var(--amber); }

/* pairing */
.pairwrap { padding: 44px 22px; text-align: center; }
.pairwrap .logo {
	width: 88px; height: 88px; border-radius: 22px; background: var(--amber); color: #fff;
	font-size: 2.4rem; display: flex; align-items: center; justify-content: center;
	margin: 0 auto 18px; font-weight: 800;
}
.pairwrap h1 { font-size: 1.3rem; margin-bottom: 10px; }
.pairwrap p { color: var(--muted); font-size: .95rem; line-height: 1.55; margin-bottom: 22px; }
.pairwrap input { width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 13px; font-size: 1rem; background: #fff; text-align: center; }
.pairwrap .go { width: 100%; margin-top: 12px; background: var(--amber); color: #fff; border-radius: 12px; padding: 15px; font-size: 1.05rem; font-weight: 800; }
.pairerr { color: var(--red); font-weight: 700; font-size: .9rem; margin-top: 12px; min-height: 1.2em; }

#toast {
	position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%) translateY(120px);
	background: var(--ink); color: #fff; border-radius: 12px; padding: 12px 20px;
	font-weight: 700; font-size: .95rem; z-index: 99; transition: transform .25s ease; max-width: 90vw;
	box-shadow: 0 6px 20px rgba(0,0,0,.3);
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app"></div>
<div id="sheet" class="sheet"></div>
<div id="langovl" class="langovl"></div>
<div id="toast"></div>

/* ---------- tiny IndexedDB wrapper ----------
   Every path here can FAIL and must fail loudly-but-softly. A phone can lose
   IndexedDB to private browsing, storage pressure, iOS evicting the origin, or
   a half-deleted database — and an open request that simply never settles is
   the nastiest case, because a promise chain hung on it leaves the counter
   staring at a blank white screen with nothing to tap. Counting must continue
   in memory; only offline durability is lost. */
var _db = null;
var _dbFailed = false;
var STORAGE_OK = true;
function db() {
	if (_db) return Promise.resolve(_db);
	if (_dbFailed) return Promise.reject(new Error("storage unavailable"));
	return new Promise(function (res, rej) {
		var settled = false;
		function fail(why) {
			if (settled) return;
			settled = true; _dbFailed = true; STORAGE_OK = false;
			rej(new Error(why));
		}
		var r;
		try { r = indexedDB.open("vaccount", 1); }
		catch (e) { fail("open threw"); return; }
		r.onupgradeneeded = function () {
			var d = r.result;
			if (!d.objectStoreNames.contains("queue")) d.createObjectStore("queue", { keyPath: "uid" });
		};
		r.onsuccess = function () { if (settled) return; settled = true; _db = r.result; res(_db); };
		r.onerror = function () { fail("open error"); };
		r.onblocked = function () { fail("open blocked"); };
		setTimeout(function () { fail("open timed out"); }, 5000);
	});
}
function idbPut(v) { return db().then(function (d) { return new Promise(function (res, rej) { var t = d.transaction("queue", "readwrite"); t.objectStore("queue").put(v); t.oncomplete = function () { res(); }; t.onerror = function () { rej(t.error); }; }); }); }
function idbDel(k) { return db().then(function (d) { return new Promise(function (res, rej) { var t = d.transaction("queue", "readwrite"); t.objectStore("queue").delete(k); t.oncomplete = function () { res(); }; t.onerror = function () { rej(t.error); }; }); }); }
function idbAll() { return db().then(function (d) { return new Promise(function (res, rej) { var q = d.transaction("queue").objectStore("queue").getAll(); q.onsuccess = function () { res(q.result || []); }; q.onerror = function () { rej(q.error); }; }); }); }

/* ---------- api (paired token OR desk session) ---------- */
function api(path, opts) {
	opts = opts || {};
	var headers = {};
	if (LS.vaccount_token) headers["Authorization"] = "token " + LS.vaccount_token;
	else if (CSRF) headers["X-Frappe-CSRF-Token"] = CSRF;
	var body;
	if (opts.json) { headers["Content-Type"] = "application/json"; body = JSON.stringify(opts.json); }
	return fetch(path, {
		method: opts.method || "GET",
		headers: headers,
		body: body,
		credentials: "same-origin"
	}).catch(function () {
		throw { net: true, message: T("e_network") };
	}).then(function (res) {
		if (res.status === 401 || res.status === 403) throw { auth: true, message: T("e_auth") };
		return res.text().then(function (text) {
			var data = {};
			try { data = JSON.parse(text); } catch (e) { }
			if (!res.ok) {
				var m = data.exception || ("HTTP " + res.status);
				if (data._server_messages) {
					try { m = JSON.parse(JSON.parse(data._server_messages)[0]).message || m; } catch (e) { }
				}
				throw { message: String(m).replace(/<[^>]*>/g, "").slice(0, 200) };
			}
			return data;
		});
	});
}

/* ---------- helpers ---------- */
function $id(i) { return document.getElementById(i); }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }
function pad2(n) { return String(n).padStart(2, "0"); }
function today() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
/* LOCAL wall-clock, never toISOString(): the site is Asia/Kolkata and the
   server REJECTS a timestamp carrying Z/offset — accepting one would read the
   book 5h30m off and, near midnight, file the count under the wrong day. */
function nowStamp() {
	var d = new Date();
	return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()) + " " +
		pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
}
function niceDate(iso) { if (!iso) return ""; var p = String(iso).split("-"); return p[2] + "/" + p[1]; }
function uidNew() {
	return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : "u" + Date.now() + "-" + Math.random().toString(36).slice(2, 10);
}
var toastTimer = null;
function toast(msg) {
	var t = $id("toast"); t.textContent = msg; t.classList.add("show");
	clearTimeout(toastTimer);
	toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2400);
}

/* ---------- warehouse ----------
   Which physical place is being counted. It is not cosmetic: the session
   becomes ONE Stock Reconciliation against ONE warehouse, and the book
   snapshot is read per warehouse. Counting the right shelf into the wrong
   location would post a correction against a book that was never wrong. */
var WH = LS.vaccount_wh || "";

/* ---------- sessions (one run per day PER WAREHOUSE) ----------
   Keyed by date+warehouse and kept as a map, so a counter who moves to
   another location and comes back rejoins the original run instead of
   stranding it half-sent. */
function sessionMap() {
	try { return JSON.parse(LS.vaccount_sessions || "{}"); } catch (e) { return {}; }
}
function sessionUidFor(wh) {
	var k = today() + "|" + (wh || "");
	var m = sessionMap();
	if (!m[k]) {
		m[k] = "SC-" + uidNew();
		LS.vaccount_sessions = JSON.stringify(m);
	}
	return m[k];
}
function clearSessionFor(wh) {
	var m = sessionMap();
	delete m[today() + "|" + (wh || "")];
	LS.vaccount_sessions = JSON.stringify(m);
}

/* ---------- bootstrap cache ---------- */
function getBoot() { try { return JSON.parse(LS.vaccount_boot || "null"); } catch (e) { return null; } }

/* The ONLY place a bootstrap payload is stored.
   Both callers (first pairing and every later refresh) must go through this:
   when tryPair kept its own copy, a freshly paired phone never adopted the
   server's warehouse, so WH stayed "" — every counted row was tagged with an
   empty warehouse, and the moment a later refresh set WH the per-warehouse
   queue filter hid those rows, the item looked uncounted, got counted twice,
   and make_recon then refused the whole session as a duplicate. */
function storeBoot(b) {
	b = b || {};
	b.ts = Date.now();
	/* the server decides the effective warehouse (it validates the request and
	   falls back to the Stock Settings default) — adopt whatever it used */
	if (b.warehouse) { WH = b.warehouse; LS.vaccount_wh = WH; }
	LS.vaccount_boot = JSON.stringify(b);
	return b;
}
function refreshBoot(force) {
	var boot = getBoot();
	var fresh = boot && boot.date === today() && (Date.now() - boot.ts < 6 * 3600 * 1000);
	if (!force && fresh) return Promise.resolve(boot);
	if (!navigator.onLine && boot) return Promise.resolve(boot);
	return api("/api/method/stock_count_bootstrap", {
		method: "POST", json: WH ? { warehouse: WH } : {}
	}).then(function (r) {
		return storeBoot(r.message || {});
	}).catch(function (e) {
		if (e.auth && !boot) throw e;
		if (!boot) throw e;
		return boot; /* stale list is fine on a shelf with no signal */
	});
}

/* ---------- sync ---------- */
var syncing = false;
var LAST_ERR = "";
function pendingCount(items) {
	return items.filter(function (x) { return x.state !== "done"; }).length;
}
function syncNow(finish) {
	if (syncing || !navigator.onLine) { updateNet(); return Promise.resolve(); }
	if (!LS.vaccount_token && !CSRF) { return Promise.resolve(); }
	syncing = true; updateNet();
	return idbAll().catch(function () {
		STORAGE_OK = false;
		return queueRows();          /* storage is down — sync what is in memory */
	}).then(function (items) {
		var out = items.filter(function (x) { return x.state !== "done"; });
		/* One batch per warehouse: a batch becomes one session, and a session
		   becomes one Stock Reconciliation against one location. Counts left
		   pending in a place the counter has since walked away from still get
		   sent — to THEIR own session, not the current one. */
		var groups = {};
		out.forEach(function (q) {
			var w = q.wh || WH || "";
			if (!groups[w]) groups[w] = [];
			groups[w].push(q);
		});
		if (finish && !groups[WH]) groups[WH] = [];   /* status-only close */
		var keys = Object.keys(groups);
		if (!keys.length) return null;

		var chain = Promise.resolve();
		var mine = null;
		keys.forEach(function (w) {
			chain = chain.then(function () {
				var rows = groups[w];
				rows.sort(function (a, b) { return a.at < b.at ? -1 : 1; });
				var payload = {
					session_uid: sessionUidFor(w),
					count_date: today(),
					warehouse: w,
					source: "Day Schedule",
					lines: rows.map(function (q) {
						return {
							uid: q.uid, item: q.item, qty: q.qty,
							note: NOTE_EN[q.note] || q.note || "",   /* key -> stable English */
							at: q.at
						};
					})
				};
				if (finish && w === WH) payload.finish = 1;
				return api("/api/method/stock_count_submit", { method: "POST", json: payload }).then(function (r) {
					var msg = r.message || {};
					if (w === WH) mine = msg;
					var c = Promise.resolve();
					rows.forEach(function (q) {
						q.state = "done"; q.err = "";
						c = c.then(function () { return idbPut(q).catch(function () { STORAGE_OK = false; }); });
					});
					return c;
				}).catch(function (e) {
					if (e.auth) { needPair(); throw e; }
					if (e.net) throw e;          /* offline — stop, keep the queue */
					var c = Promise.resolve();
					rows.forEach(function (q) {
						q.state = "error"; q.err = e.message || "?";
						c = c.then(function () { return idbPut(q).catch(function () { STORAGE_OK = false; }); });
					});
					/* one bad warehouse must not block the others */
					return c.then(function () { LAST_ERR = e.message || "?"; });
				});
			});
		});
		return chain.then(function () {
			if (!mine && LAST_ERR) { var e = LAST_ERR; LAST_ERR = ""; throw { message: e }; }
			return mine;
		});
	}).then(function (msg) {
		syncing = false;
		/* reload from IndexedDB before painting: syncNow marks the rows it read
		   out of the store, which are DIFFERENT objects from the ones in the
		   in-memory QUEUE map — repainting without this leaves every synced
		   card stuck showing "pending". */
		return loadQueue().then(function () { updateNet(); render(); return msg; });
	}).catch(function (e) {
		syncing = false;
		return loadQueue().then(function () {
			updateNet(); render();
			if (e && e.message && !e.net) toast(e.message);
			return null;
		});
	});
}

/* ---------- state ---------- */
var TAB = "due";
var QUEUE = {};   /* item_code -> queue row */
var SEARCH = "";

function loadQueue() {
	return idbAll().then(function (items) {
		STORAGE_OK = true;
		var q = {};
		var d = today();
		items.forEach(function (x) {
			if (x.date !== d) return;                    /* yesterday is history */
			/* a row with no warehouse predates storeBoot() adopting one — treat
			   it as this location's rather than orphaning it into invisibility,
			   which is what would make an already-counted item look uncounted */
			if (x.wh && (x.wh !== (WH || ""))) return;   /* another location's run */
			q[x.item] = x;
		});
		QUEUE = q;
		return items;
	}).catch(function () {
		/* keep whatever QUEUE already holds — counts taken this session are
		   still in memory and still syncable; only durability is gone */
		STORAGE_OK = false;
		return [];
	});
}
function queueRows() {
	var a = [];
	Object.keys(QUEUE).forEach(function (k) { a.push(QUEUE[k]); });
	return a;
}

/* ---------- render ---------- */
function updateNet() {
	var dot = document.querySelector(".netdot");
	if (dot) dot.classList.toggle("off", !navigator.onLine);
	var s = document.querySelector(".hdr .sync");
	if (s) s.classList.toggle("spin", syncing);
	var off = $id("offbar");
	if (off) off.style.display = navigator.onLine ? "none" : "block";
}

function render() {
	var b = getBoot() || {};
	var rows = b.rows || [];
	var dueRows = rows.filter(function (r) { return r.due; });
	var counted = 0;
	dueRows.forEach(function (r) { if (QUEUE[r.item]) counted++; });
	var totalDue = dueRows.length || 0;
	var pend = 0;
	Object.keys(QUEUE).forEach(function (k) { if (QUEUE[k].state !== "done") pend++; });

	var h = "";
	h += '<div class="hdr">';
	h += '<div class="grow"><div class="ttl">' + esc(T("app")) + '</div><div class="who">' + esc(b.counter || "") + (b.date ? " · " + niceDate(b.date) : "") + '</div></div>';
	h += '<div class="netdot"></div>';
	if (pend) h += '<div class="pendbadge">' + pend + '</div>';
	h += '<button class="langbtn" onclick="openLang()">' + esc(langShort()) + '</button>';
	h += '<button class="sync" onclick="onSync()">⟳</button>';
	h += '</div>';
	h += '<div class="offbar" id="offbar" style="display:none">' + esc(T("offline_bar")) + '</div>';
	if (!STORAGE_OK) h += '<div class="offbar warn">' + esc(T("e_storage")) + '</div>';

	/* Which place is being counted — always visible, never a hidden setting.
	   Counting the right shelf into the wrong location is a silent error. */
	h += '<button class="whbar" onclick="openWh()"><span class="pin">▾</span>' +
		'<span class="wn">' + esc(WH || b.warehouse || "—") + '</span>' +
		'<span class="wc">' + esc(T("wh_change")) + ' ›</span></button>';

	h += '<div class="prog"><div class="pline"><span class="pn">' + counted + ' / ' + totalDue + '</span><span class="pt">' + esc(T("to_count")) + '</span></div>';
	h += '<div class="bar"><div style="width:' + (totalDue ? Math.round(counted * 100 / totalDue) : 0) + '%"></div></div></div>';

	h += '<div class="tabs">';
	h += '<button class="' + (TAB === "due" ? "on" : "") + '" onclick="setTab(\'due\')">' + esc(T("tab_today")) + '</button>';
	h += '<button class="' + (TAB === "all" ? "on" : "") + '" onclick="setTab(\'all\')">' + esc(T("tab_search")) + '</button>';
	h += '</div>';

	h += (TAB === "due") ? renderDue(rows, b) : renderSearch(b);

	h += '<div class="fbar"><button ' + (counted ? "" : "disabled") + ' onclick="onFinish()">' + esc(T("finish")) + '</button></div>';

	$id("app").innerHTML = h;
	updateNet();
	if (TAB === "all") {
		var si = $id("sq");
		if (si) { si.value = SEARCH; si.oninput = function () { SEARCH = si.value; renderListOnly(); }; }
	}
}

function itemCard(r, isFam, b) {
	var q = QUEUE[r.item];
	var cls = "it" + (isFam ? " fam" : "") + (q ? (q.state === "done" ? " done" : " pend") : "");
	var sub = [];
	if (r.uom) sub.push(esc(r.uom));
	if (r.last_counted) sub.push(esc(T("last")) + " " + niceDate(r.last_counted));
	else sub.push(esc(T("never")));
	var tags = "";
	if (isFam) tags += '<span class="tag fam">' + esc(T("tag_together")) + '</span>';
	else if (r.cat === "PRIORITY" || String(r.cat).indexOf("PRIORITY") === 0) tags += '<span class="tag pri">' + esc(T("tag_priority")) + '</span>';
	if (!q && b.counted_today && b.counted_today.indexOf(r.item) >= 0) tags += '<span class="tag today">' + esc(T("tag_done_today")) + '</span>';

	var right = q
		? '<div class="qty">' + esc(String(q.qty)) + '</div>'
		: '<div class="chev">›</div>';
	return '<button class="' + cls + '" onclick="openSheet(' + JSON.stringify(r.item).replace(/"/g, "&quot;") + ')">' +
		'<div class="g"><div class="n">' + tags + esc(r.label) + '</div>' +
		'<div class="s">' + sub.join(' <span class="sep">·</span> ') + '</div></div>' + right + '</button>';
}

function renderDue(rows, b) {
	if (!rows.length) {
		return '<div class="empty">' + T("empty_due") + '</div>';
	}
	var h = '<div id="lst">';
	rows.forEach(function (r) {
		h += itemCard(r, !r.due, b);
	});
	return h + '</div>';
}

function renderSearch(b) {
	var h = '<div class="srch"><input id="sq" type="search" placeholder="' + esc(T("search_ph")) + '" autocomplete="off"></div>';
	h += '<div id="lst">' + searchList(b) + '</div>';
	return h;
}

function searchList(b) {
	var items = (b.items || []);
	var term = SEARCH.trim().toLowerCase();
	if (!term) return '<div class="empty">' + T("empty_search") + '</div>';
	var hits = [];
	for (var i = 0; i < items.length && hits.length < 60; i++) {
		var it = items[i];
		var nm = (it.item_name || it.name || "");
		if (nm.toLowerCase().indexOf(term) >= 0 || String(it.name).toLowerCase().indexOf(term) >= 0) {
			hits.push({ item: it.name, label: nm || it.name, uom: it.stock_uom, last_counted: null, cat: "", due: 0 });
		}
	}
	if (!hits.length) return '<div class="empty">' + esc(T("empty_none")) + '</div>';
	var h = "";
	hits.forEach(function (r) { h += itemCard(r, false, b); });
	return h;
}

function renderListOnly() {
	var b = getBoot() || {};
	var l = $id("lst");
	if (l) l.innerHTML = (TAB === "due") ? "" : searchList(b);
	if (TAB === "due") render();
}

function setTab(t) { TAB = t; SEARCH = ""; render(); }
function onSync() { syncNow(false).then(function () { toast(T("t_sent")); }); }

/* ---------- count sheet ---------- */
var SHEET = { item: null, label: "", uom: "", val: "", note: "" };

function findRow(code) {
	var b = getBoot() || {};
	var rows = b.rows || [];
	for (var i = 0; i < rows.length; i++) if (rows[i].item === code) return rows[i];
	var items = b.items || [];
	for (var j = 0; j < items.length; j++) {
		if (items[j].name === code) return { item: code, label: items[j].item_name || code, uom: items[j].stock_uom };
	}
	return { item: code, label: code, uom: "" };
}

function openSheet(code) {
	var r = findRow(code);
	var q = QUEUE[code];
	SHEET = { item: code, label: r.label, uom: r.uom || "", val: q ? String(q.qty) : "", note: q ? (q.note || "") : "" };
	var locked = q && q.state === "done";

	var h = '<div class="shd"><button class="back" onclick="closeSheet()">‹</button>' +
		'<div class="grow"><div class="t1">' + esc(r.label) + '</div>' +
		'<div class="t2">' + esc(r.uom || "") + '</div></div></div>';
	h += '<div class="body">';
	if (locked) {
		h += '<div class="ask">' + T("locked_1", "<b>" + esc(String(q.qty)) + "</b>") + '</div>';
		h += '<div class="locked">' + esc(T("locked_2")) + '</div>';
		h += '</div>';
		$id("sheet").innerHTML = h;
		$id("sheet").classList.add("show");
		return;
	}
	h += '<div class="ask"><b>' + esc(T("ask")) + '</b>' + (r.uom ? ' <b>(' + esc(r.uom) + ')</b>' : '') + '</div>';
	h += '<div class="disp" id="disp"></div>';
	h += '<div class="notechips">';
	NOTE_KEYS.forEach(function (nk) {
		h += '<button data-note="' + nk + '" onclick="setNote(this)">' + esc(T("note_" + nk)) + '</button>';
	});
	h += '</div>';
	h += '<div class="pad">';
	["1", "2", "3", "4", "5", "6", "7", "8", "9"].forEach(function (k) { h += '<button onclick="key(\'' + k + '\')">' + k + '</button>'; });
	h += '<button class="fn" onclick="key(\'.\')">·</button>';
	h += '<button onclick="key(\'0\')">0</button>';
	h += '<button class="fn" onclick="key(\'bk\')">⌫</button>';
	h += '</div>';
	h += '</div>';
	h += '<div class="savewrap"><button class="save" id="savebtn" onclick="saveCount()">' + esc(T("save")) + '</button></div>';
	$id("sheet").innerHTML = h;
	$id("sheet").classList.add("show");
	paintDisp();
}
function closeSheet() { $id("sheet").classList.remove("show"); $id("sheet").innerHTML = ""; }

function key(k) {
	if (k === "bk") SHEET.val = SHEET.val.slice(0, -1);
	else if (k === ".") { if (SHEET.val.indexOf(".") < 0 && SHEET.val) SHEET.val += "."; }
	else {
		if (SHEET.val === "0") SHEET.val = "";
		if (SHEET.val.replace(".", "").length < 7) SHEET.val += k;
	}
	paintDisp();
}
function setNote(btn) {
	var n = btn.getAttribute("data-note");
	SHEET.note = (SHEET.note === n) ? "" : n;
	Array.prototype.forEach.call(document.querySelectorAll(".notechips button"), function (b) {
		b.classList.toggle("on", b.getAttribute("data-note") === SHEET.note);
	});
	/* "not found" is a real, meaningful count of zero */
	if (SHEET.note === "missing") { SHEET.val = "0"; paintDisp(); }
}
function paintDisp() {
	var d = $id("disp");
	if (!d) return;
	d.textContent = SHEET.val === "" ? "—" : SHEET.val;
	d.classList.toggle("ph", SHEET.val === "");
	var s = $id("savebtn");
	if (s) s.disabled = (SHEET.val === "" || SHEET.val === ".");
}

function saveCount() {
	if (SHEET.val === "" || SHEET.val === ".") return;
	var qty = parseFloat(SHEET.val);
	if (isNaN(qty) || qty < 0) { toast(T("t_checknum")); return; }
	var prev = QUEUE[SHEET.item];
	/* reuse the uid while the line is still unsent, so an edit REPLACES rather
	   than adding a second line for the same item (the server refuses a session
	   holding one item twice) */
	var row = {
		uid: (prev && prev.state !== "done") ? prev.uid : uidNew(),
		date: today(),
		wh: WH,
		item: SHEET.item,
		label: SHEET.label,
		qty: qty,
		note: SHEET.note,
		at: nowStamp(),
		state: "queued",
		err: ""
	};
	/* a storage failure must not lose the count — keep it in memory and sync */
	idbPut(row).catch(function () { STORAGE_OK = false; }).then(function () {
		QUEUE[SHEET.item] = row;
		closeSheet();
		render();
		toast(T("t_saved"));
		syncNow(false);
	});
}

function onFinish() {
	var n = Object.keys(QUEUE).length;
	if (!n) return;
	if (!confirm(T("confirm_finish", n))) return;
	syncNow(true).then(function (msg) {
		if (msg && msg.session) {
			toast(T("t_sent") + " " + msg.session);
			clearSessionFor(WH);   /* only THIS location's run is closed */
		} else if (!navigator.onLine) {
			toast(T("t_offline_q"));
		}
	});
}

/* ---------- pairing ---------- */
function checkPairFromHash() {
	var m = (location.hash || "").match(/[#&]pair=([^&]+)/);
	if (m) {
		LS.vaccount_token_candidate = decodeURIComponent(m[1]).trim();
		history.replaceState(null, "", location.pathname);
	}
}
function tryPair(tok) {
	tok = (tok || "").trim();
	if (!tok || tok.indexOf(":") < 1) return Promise.reject({ message: T("pair_bad") });
	var prev = LS.vaccount_token;
	LS.vaccount_token = tok;
	return api("/api/method/stock_count_bootstrap", { method: "POST", json: {} }).then(function (r) {
		var b = storeBoot(r.message || {});
		LS.removeItem("vaccount_token_candidate");
		return b;
	}).catch(function (e) {
		if (prev) LS.vaccount_token = prev; else LS.removeItem("vaccount_token");
		throw e.net ? { message: T("pair_net") } : { message: T("pair_fail") };
	});
}
function needPair() { renderPair(T("pair_expired")); }
function renderPair(err) {
	var langs = "";
	LANGS.forEach(function (l) {
		langs += '<button class="' + (l.code === LANG ? "on" : "") + '" onclick="setLang(\'' + l.code + '\')">' + esc(l.label) + '</button>';
	});
	$id("app").innerHTML =
		'<div class="pairwrap"><div class="logo">✓</div>' +
		'<h1>' + esc(T("pair_h")) + '</h1>' +
		'<div class="langrow">' + langs + '</div>' +
		'<p>' + T("pair_p") + '</p>' +
		'<input id="ptok" type="text" placeholder="' + esc(T("pair_ph")) + '" autocapitalize="off" autocorrect="off" spellcheck="false">' +
		'<button class="go" onclick="doPair()">' + esc(T("pair_go")) + '</button>' +
		'<div class="pairerr">' + esc(err || "") + '</div></div>';
}
function doPair() {
	var v = ($id("ptok") || {}).value || "";
	tryPair(v).then(function () { boot(); toast(T("t_paired")); })
		.catch(function (e) { renderPair(e.message); });

}

/* ---------- boot ---------- */
function boot() {
	applyLangChrome();
	checkPairFromHash();
	var cand = LS.vaccount_token_candidate;
	if (cand) {
		tryPair(cand).then(function () { boot(); toast(T("t_paired")); })
			.catch(function (e) { renderPair(e.message); });

		return;
	}
	if (!LS.vaccount_token && !CSRF) { renderPair(""); return; }

	loadQueue().then(function () {
		render();
		return refreshBoot(false);
	}).then(function () {
		render();
		syncNow(false);
	}).catch(function (e) {
		if (e && e.auth) needPair();
		else if (e && e.message) toast(e.message);
	});
}

window.addEventListener("hashchange", function () {
	if ((location.hash || "").indexOf("pair=") >= 0) boot();
});
window.addEventListener("online", function () { updateNet(); syncNow(false); });
window.addEventListener("offline", updateNet);
document.addEventListener("visibilitychange", function () { if (!document.hidden) syncNow(false); });

if ("serviceWorker" in navigator) {
	try { navigator.serviceWorker.register("/api/method/agriops_suite.count.sw", { scope: "/count" }).catch(function () { }); } catch (e) { }
}

boot();
</script>
